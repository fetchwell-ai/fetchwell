# electron-builder configuration
# Docs: https://www.electron.build/configuration

appId: ai.fetchwell.app
productName: Fetchwell

# Override the main entry point to use the compiled CJS output
extraMetadata:
  main: dist-electron/main.js

# Build resources (icons, etc.)
directories:
  output: release
  buildResources: build

# Files to include in the app bundle
files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.{md,ts,map}"

asar: true

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  target:
    - dmg
  category: public.app-category.medical
  icon: build/icon.icns
  # Set to null to allow unsigned builds during development.
  # When CSC_LINK and CSC_KEY_PASSWORD env vars are set,
  # electron-builder will sign automatically.
  # Project owner's signing identity. Contributors: set CSC_NAME env var to use your own.
  identity: "Chad Allen (SDWTXTZJ3F)"
  notarize: true

dmg:
  title: "${productName} ${version}"

# ── Auto-update via GitHub Releases ────────────────────────────────────────────
publish:
  provider: github
  owner: fetchwell-ai
  repo: fetchwell

# ── Playwright Chromium (~200 MB) bundled as an unpacked resource ──────────────
# Playwright Chromium is bundled as an unpacked resource (~200 MB).
# The glob matches the version-stamped directory that `playwright install chromium`
# creates in ~/Library/Caches/ms-playwright/ (e.g. chromium-1217/).
# At runtime, electron/main.ts sets PLAYWRIGHT_BROWSERS_PATH to
# path.join(process.resourcesPath, 'ms-playwright') so Playwright finds it.
extraResources:
  - from: "${env.HOME}/Library/Caches/ms-playwright/chromium-1217"
    to: "ms-playwright/chromium-1217"
    filter:
      - "**/*"
