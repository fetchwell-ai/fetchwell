<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fetchwell — Desktop app (proposal)</title>
  <link rel="stylesheet" href="kit.css" />
  <style>
    /* Window-frame chrome around the app for the prototype */
    body { padding: 32px; min-height: 100vh; box-sizing: border-box; background: var(--fw-paper-deep); }
    .window {
      width: 1180px; height: 760px; max-width: 100%;
      margin: 0 auto;
      background: var(--fw-paper);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(40,30,15,0.18), 0 8px 24px rgba(40,30,15,0.10);
      display: flex;
      flex-direction: column;
    }
    .traffic-lights { display: flex; gap: 8px; padding: 12px 16px; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--fw-border); flex-shrink: 0; }
    .traffic-lights span { width: 12px; height: 12px; border-radius: 999px; }
    .traffic-lights span:nth-child(1) { background: #FF5F57; }
    .traffic-lights span:nth-child(2) { background: #FEBC2E; }
    .traffic-lights span:nth-child(3) { background: #28C840; }
    .window .fw-app { flex: 1; min-height: 0; }
  </style>
</head>
<body>
  <div class="window">
    <div class="traffic-lights"><span></span><span></span><span></span></div>
    <div id="root" class="fw-app"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="quickstart.jsx"></script>
  <script type="text/babel" src="portal-card.jsx"></script>
  <script type="text/babel" src="sidebar.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
